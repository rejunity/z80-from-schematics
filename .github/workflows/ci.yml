name: CI

# Every push and every PR fires the fast tier (c-tests, rtl-tests,
# parity-tests). PRs to main, a nightly cron, and manual dispatch
# additionally fire the slow ZEX jobs (zexdoc + zexall in parallel).
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 4 * * *'        # 04:00 UTC daily
  workflow_dispatch: {}

# Cancel stale runs of the same branch/PR when a newer push lands —
# avoids burning minutes on commits the user has already superseded.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =====================================================================
  # FAST TIER — runs on every push + every PR.
  # Three parallel jobs split by tool surface, each installing only what
  # it needs.
  # =====================================================================

  c-tests:
    name: C model (ctest + FUSE + silicon + lockstep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3
      - name: C unit tests (test_alu/block/cb/ddcb/ddfd/ed/exec/flags/int/pla)
        run: make ctest
      - name: FUSE / Cringle 1356 cases through C model
        run: make fuse
      - name: Real-silicon T-state oracle (sigrok KC85 capture)
        run: make silicon_cycles
      - name: Real-silicon sub-T-state timing (sigrok 20 MHz capture)
        run: make silicon_async
      - name: 4-way lockstep on ZEXDOC3 (mine + superzazu + chips + suzukiplan)
        run: |
          make tracegen
          c++ -std=gnu++17 -O2 -w -Iscripts -Icmodel \
            scripts/lockstep_quad.c build/libz80.a -o build/bin/lockstep_quad
          build/bin/lockstep_quad tests/zex/zexdoc3.com 20000000

  rtl-tests:
    name: RTL (iverilog elaboration + FUSE through RTL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install C + iverilog
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 iverilog
      - name: RTL elaboration smoke (iverilog)
        run: make rtl
      - name: FUSE / Cringle 1356 cases through iverilog RTL
        run: make fuse_rtl

  basic-c-tests:
    name: BASIC ROM via C model (NASCOM 4.7c + Tiny BASIC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3
      - name: Pipe canned scripts through basicrunner and verify output
        run: make basic_c_tests

  basic-rtl-tests:
    name: BASIC ROM via Verilator RTL (NASCOM 4.7c + Tiny BASIC)
    runs-on: ubuntu-latest
    # With --exit-on sentinel handling, the whole suite finishes in <2 s
    # of sim time (each subtest only runs ~100-150K instructions past
    # its "DONE-XYZ" before exiting the grace window). The 45 min
    # timeout stays as a safety net: real wall clock is dominated by
    # apt install + Verilator build (~1-2 min).
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: Install C + Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 verilator
      - name: Pipe canned scripts through sim_basic (Verilated RTL) and verify
        run: make basic_rtl_tests

  z80test:
    name: Patrik Rak z80test (doc / memptr / full — within baseline)
    runs-on: ubuntu-latest
    # 3 variants × ~25 s each + cold start = ~2 min
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Install C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3
      - name: Run Rak's z80doc + z80memptr + z80full and check baselines
        run: make z80test

  parity-tests:
    name: Parity (C vs iverilog vs Verilator + perfectz80)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install C + iverilog + Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 iverilog verilator
      - name: Build Verilator sim (sim_z80) so compare actually exercises it
        run: make verilator
      - name: C vs iverilog vs Verilator parity (8 hand + 4 random trace programs)
        run: make compare
      - name: C model vs perfectz80 gate-level netlist (signal-timing)
        run: make perfectz80
      - name: iverilog RTL vs perfectz80 gate-level netlist (signal-timing)
        # Same 12 trace programs, but the trace source is the iverilog RTL
        # testbench (build/tb_z80.vvp) rather than the C model. This is the
        # silicon-faithful leg — every cycle simulated at RTL fidelity,
        # diffed against the gate-level netlist per-half-cycle. Random
        # programs (prog_rnd_01..04 from scripts/gen_random_trace_progs.py)
        # give opcode-mix coverage no hand-written program would have.
        run: make perfectz80_rtl
      - name: Pin-scenario programs vs perfectz80 (INFORMATIONAL)
        # 12 trace programs (prog9..prog20) that drive INT / NMI / WAIT /
        # BUSREQ / RESET via the .events sidecar. Currently surface real
        # silicon-faithfulness divergences vs gate-level — the make target
        # is informational and exits 0 even on divergences. CI shows the
        # findings without going red.
        run: make pin_scenarios

  # =====================================================================
  # LIBRELANE GATE-LEVEL — "ultimate test". Synthesise rtl/*.v via
  # LibreLane (Yosys.Synthesis only) into a sky130 gate-level netlist,
  # then diff the synthesised netlist's per-half-cycle pin behaviour
  # against the perfectz80 Visual-Z80 gate-level netlist. See
  # docs/librelane-flow.md for the full plan.
  #
  # Heavy step. First cold run on a CI runner is ~8-10 min (nix store
  # download + librelane install + sky130 PDK fetch + ~2 min synth).
  # Subsequent runs are ~30 s when the synth-output cache is warm and
  # ~5 min when only the nix-store cache is warm.
  #
  # Gated to every push during development per user direction.
  # =====================================================================

  librelane-netlist:
    name: LibreLane gate-level sim vs perfectz80 (5 starter programs)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix (Determinate Systems)
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache /nix/store across runs
        # Speeds up the librelane install on subsequent runs by an
        # order of magnitude. First run is still ~5-8 min for the full
        # closure download.
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install LibreLane via nix profile
        run: nix profile install github:librelane/librelane

      - name: Cache synthesised netlist on (rtl + librelane config) hash
        id: synth-cache
        uses: actions/cache@v4
        with:
          path: build/synth
          key: synth-${{ hashFiles('rtl/*.v', 'librelane/config.json', 'librelane/run_synth.sh') }}

      - name: Install C toolchain + iverilog
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 iverilog

      - name: Run LibreLane synthesis (skipped on cache hit)
        if: steps.synth-cache.outputs.cache-hit != 'true'
        run: make synth

      - name: Build gate-level iverilog testbench (sky130 cells)
        run: make iverilog_netlist

      - name: Gate-level netlist vs perfectz80 (5 starter programs)
        run: make perfectz80_netlist

      - name: Upload synthesised netlist artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: synth-netlist
          path: build/synth/z80_core.nl.v
          retention-days: 30

  # =====================================================================
  # ZEX TIER (C model) — runs on every event, including every push.
  # ZEXDOC and ZEXALL are independent jobs so they run in parallel
  # (~18 + 19 min serial -> ~19 min parallel wall clock). Neither
  # depends on the fast tier — each has its own self-contained build
  # (no iverilog/verilator needed).
  # =====================================================================

  zexdoc:
    name: ZEXDOC (~18 min via C model)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: Install C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3
      - name: Run ZEXDOC and fail on any ERROR line
        run: |
          make zexrunner
          set -o pipefail
          # stdbuf -oL forces line buffering on the zexrunner pipe so each
          # Cringle "<test> ...  OK" line streams to the live log as soon
          # as it's emitted — without this glibc block-buffers stdout when
          # not a TTY and you only see output after the ~18 min run ends.
          stdbuf -oL build/bin/zexrunner tests/zex/zexdoc.com 6000000000 2>&1 \
            | stdbuf -oL tr -d '\r' | tee zexdoc.log
          if grep -q ERROR zexdoc.log; then
            echo "::error::ZEXDOC reported ERROR — see lines above"
            exit 1
          fi
      - name: Upload ZEXDOC log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: zexdoc-log
          path: zexdoc.log
          retention-days: 14

  zexall:
    name: ZEXALL (~19 min via C model)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: Install C toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3
      - name: Run ZEXALL and fail on any ERROR line
        run: |
          make zexrunner
          set -o pipefail
          stdbuf -oL build/bin/zexrunner tests/zex/zexall.com 12000000000 2>&1 \
            | stdbuf -oL tr -d '\r' | tee zexall.log
          if grep -q ERROR zexall.log; then
            echo "::error::ZEXALL reported ERROR — see lines above"
            exit 1
          fi
      - name: Upload ZEXALL log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: zexall-log
          path: zexall.log
          retention-days: 14

  # =====================================================================
  # RTL ZEXALL via Verilator — apples-to-apples with the C-side zexall,
  # but every cycle simulated at gate-level-equivalent fidelity. Verilator
  # is ~20x slower than the C model, so this is gated to push-to-main /
  # nightly cron / manual dispatch (~15-25 min wall clock).
  #
  # NOTE: the FULL ZEXALL via Verilator RTL is not currently run in CI.
  # We have a known set of silicon-faithful gaps (block-op M-cycle
  # ordering; LDIR/LDDR + INIR/INDR Q-leak) that make the full 67-test
  # ZEXALL fail under the RTL today — see docs/known-differences.md and
  # docs/simplifications.md. Once those gaps land, restore a full-ZEXALL
  # RTL job here gated the same way.
  # =====================================================================

  zexall-subset-rtl:
    name: ZEXALL 14-test subset via Verilator RTL (~15-25 min)
    runs-on: ubuntu-latest
    # Same gate as a former full-ZEXALL-RTL job — runs only on push to
    # main / master, nightly cron, or manual dispatch. Branch-push
    # builds skip this leg; the C-side ZEXDOC + ZEXALL still run on
    # every push so day-to-day branches don't lose coverage.
    if: >-
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
      || github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
    # The subset is the curated audit-focused 14-test slice of ZEXALL
    # (LDIR/LDDR/CPIR/CPDR + DDCB variants + RRD/RLD + NEG + DAA/SCF/CCF
    # + 16-bit ADC/SBC HL,rp). 550M instr on C = ~86 s; Verilator at
    # ~0.5 Minstr/s on ubuntu-latest = ~15-25 min wall clock.
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v5
      - name: Install C + Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 verilator
      - name: Run ZEXALL 14-test subset through Verilator RTL; fail on ERROR
        run: |
          set -o pipefail
          stdbuf -oL make zexall_subset_rtl 2>&1 \
            | stdbuf -oL tr -d '\r' | tee zexall_subset_rtl.log
          if grep -q ERROR zexall_subset_rtl.log; then
            echo "::error::ZEXALL subset through Verilator RTL reported ERROR — see lines above"
            exit 1
          fi
      - name: Upload ZEXALL-subset-RTL log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: zexall-subset-rtl-log
          path: zexall_subset_rtl.log
          retention-days: 14
